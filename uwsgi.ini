; Overrides /openedx/uwsgi.ini from overhangio/openedx, which hardcodes
; `http = 0.0.0.0:8000`. Sevalla injects $PORT and routes only to that port.
;
; $(NAME) is uwsgi's environment-variable interpolation, not a shell
; substitution: the variable must exist or uwsgi aborts. PORT, SERVICE_VARIANT
; and UWSGI_WORKERS all get defaults in the Dockerfile.
[uwsgi]
http = 0.0.0.0:$(PORT)

; Serve collected assets straight from uwsgi; there is no nginx in front of us
; on Sevalla. CMS assets live under staticfiles/studio, so /static/studio/x
; resolves through this same mapping.
static-map = /static=/openedx/staticfiles/
static-map = /media=/openedx/media/

; lms/wsgi.py or cms/wsgi.py, selected by SERVICE_VARIANT.
wsgi-file = $(SERVICE_VARIANT)/wsgi.py
processes = $(UWSGI_WORKERS)

buffer-size = 8192
thunder-lock = true
single-interpreter = true
enable-threads = true

; Fix 502 errors for closed connections
http-keepalive = 1
add-header = Connection: Keep-Alive

; Better startup/shutdown in docker
die-on-term = true
lazy-apps = false
need-app = true
no-defer-accept = true

master = true
py-call-osafterfork = true
vacuum = true
